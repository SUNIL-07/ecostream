name: Hourly Data Ingestion

on:
  schedule:
    - cron: '0 * * * *'  # Runs exactly 1-time per hour aligning strictly alongside Live API targets natively
  workflow_dispatch:      # Grants absolute Manual Trigger functionality seamlessly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python Engine structurally
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Scale Dependencies safely
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Launch Real-Time Supabase Synchronization Protocol
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: python ingestion/fetch_data.py
